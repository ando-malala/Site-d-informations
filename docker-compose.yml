services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: site-info-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: site_info
      DB_USER: app
      DB_PASS: app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0.36
    container_name: site-info-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: site_info
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - db_data:/var/lib/mysql
      - ./backoffice/bdd:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
